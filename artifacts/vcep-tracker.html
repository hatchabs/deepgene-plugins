<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VCEP Target Tracker</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8f9fa;
      --card: #ffffff;
      --border: #e2e6ea;
      --text: #212529;
      --muted: #6c757d;
      --accent: #0d6efd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      font-size: 14px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    h1 { font-size: 18px; font-weight: 600; flex: 1; min-width: 180px; }
    .search-row { display: flex; gap: 8px; flex: 2; min-width: 240px; }
    input[type="text"] {
      flex: 1;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    button {
      padding: 7px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .panel-name { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .panel-meta { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px; }
    .meta-item { color: var(--muted); font-size: 13px; }
    .meta-item strong { color: var(--text); }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-approved  { background: #d1e7dd; color: #0a5c36; }
    .badge-ongoing   { background: #cfe2ff; color: #084298; }
    .badge-pilot     { background: #ffe5d0; color: #7d3a00; }
    .badge-inactive  { background: #f8d7da; color: #842029; }
    .badge-default   { background: #e2e3e5; color: #41464b; }
    .people-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .person-group-title { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    .person {
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .person:last-child { border-bottom: none; }
    .empty { color: var(--muted); font-style: italic; font-size: 13px; }
    .note-text { color: var(--text); line-height: 1.6; }
    .footer { text-align: right; font-size: 11px; color: var(--muted); margin-top: 4px; }
    .loading { text-align: center; color: var(--muted); padding: 40px; font-size: 14px; }
    .error-box {
      background: #f8d7da; border: 1px solid #f5c2c7;
      color: #842029; border-radius: 8px;
      padding: 12px 16px; margin-bottom: 12px;
    }
    #placeholder {
      text-align: center; color: var(--muted);
      padding: 48px 24px;
    }
    #placeholder p { font-size: 15px; margin-bottom: 6px; }
    #placeholder small { font-size: 12px; }
    #content { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <h1>VCEP Target Tracker</h1>
    <div class="search-row">
      <input type="text" id="gene-input"
        placeholder="Gene symbol or affiliation ID  (e.g. OTC, BRCA1, 50013)" />
      <button id="lookup-btn">Look up</button>
    </div>
  </div>

  <div id="error-container"></div>
  <div id="loading" class="loading" style="display:none">Looking up panel data…</div>

  <div id="placeholder">
    <p>Enter a gene symbol or ClinGen panel ID to load a VCEP profile.</p>
    <small>Examples: OTC · BRCA1 · ASS1 · PAH · NAGS · 50013</small>
  </div>

  <div id="content">
    <div class="card">
      <div class="card-title">Panel</div>
      <div class="panel-name" id="panel-name">—</div>
      <div><span id="stage-badge" class="badge badge-default">—</span></div>
      <div class="panel-meta">
        <div class="meta-item">Gene: <strong id="panel-gene">—</strong></div>
        <div class="meta-item">Disease: <strong id="panel-disease">—</strong></div>
        <div class="meta-item">Affiliation ID: <strong id="panel-affid">—</strong></div>
        <div class="meta-item">Last updated: <strong id="panel-updated">—</strong></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Panel Members</div>
      <div class="people-grid">
        <div>
          <div class="person-group-title">Chairs</div>
          <div id="chairs-list"></div>
        </div>
        <div>
          <div class="person-group-title">Coordinators</div>
          <div id="coordinators-list"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Notes</div>
      <div class="note-text" id="panel-note">—</div>
    </div>

    <div class="footer" id="refreshed-at"></div>
  </div>

  <script>
    function prompt(gene) {
      return `You are a ClinGen data assistant. Return ONLY valid JSON, no markdown fences, no explanation.

Look up the ClinGen VCEP (Variant Curation Expert Panel) for: "${gene}"

Return this exact JSON object:
{
  "panelName": "full official panel name",
  "affiliationId": "5-digit ClinGen affiliation ID, or null if unknown",
  "gene": "primary gene symbol",
  "disease": "associated disease or condition",
  "curationStage": "one of: Application, Pilot, Ongoing, Approved, Inactive",
  "chairs": ["Full Name"],
  "coordinators": ["Full Name"],
  "lastUpdated": "YYYY-MM-DD or null",
  "note": "1-2 sentences of context about this panel"
}

Use your best knowledge of ClinGen. If a field is uncertain, use null or an empty array. Return JSON only.`;
    }

    function badgeClass(stage) {
      const s = (stage || '').toLowerCase();
      if (s.includes('approved')) return 'badge-approved';
      if (s.includes('ongoing'))  return 'badge-ongoing';
      if (s.includes('pilot'))    return 'badge-pilot';
      if (s.includes('inactive')) return 'badge-inactive';
      return 'badge-default';
    }

    function renderPeople(el, list) {
      el.innerHTML = '';
      if (!list || list.length === 0) {
        el.innerHTML = '<div class="empty">Not confirmed</div>';
        return;
      }
      list.forEach(name => {
        const d = document.createElement('div');
        d.className = 'person';
        d.textContent = name;
        el.appendChild(d);
      });
    }

    function render(data) {
      document.getElementById('panel-name').textContent    = data.panelName    || '—';
      document.getElementById('panel-gene').textContent    = data.gene         || '—';
      document.getElementById('panel-disease').textContent = data.disease      || '—';
      document.getElementById('panel-affid').textContent   = data.affiliationId || '—';
      document.getElementById('panel-updated').textContent = data.lastUpdated  || '—';
      document.getElementById('panel-note').textContent    = data.note         || '—';

      const badge = document.getElementById('stage-badge');
      badge.textContent = data.curationStage || '—';
      badge.className   = 'badge ' + badgeClass(data.curationStage);

      renderPeople(document.getElementById('chairs-list'),       data.chairs);
      renderPeople(document.getElementById('coordinators-list'), data.coordinators);

      document.getElementById('refreshed-at').textContent =
        'Data via Claude · Refreshed ' + new Date().toLocaleString();

      document.getElementById('content').style.display     = 'block';
      document.getElementById('placeholder').style.display = 'none';
    }

    function showError(msg) {
      document.getElementById('error-container').innerHTML =
        `<div class="error-box">${msg}</div>`;
    }

    async function lookup(gene) {
      if (!gene.trim()) return;
      document.getElementById('error-container').innerHTML = '';
      document.getElementById('loading').style.display     = 'block';
      document.getElementById('content').style.display     = 'none';
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('lookup-btn').disabled       = true;

      try {
        const raw  = await window.cowork.askClaude(prompt(gene), []);
        const json = raw.replace(/^```(?:json)?\n?/i, '').replace(/\n?```$/i, '').trim();
        const data = JSON.parse(json);
        localStorage.setItem('vcep-last-gene', gene);
        render(data);
      } catch (e) {
        showError('Could not load panel data — check the gene symbol and try again. (' + e.message + ')');
        document.getElementById('placeholder').style.display = 'block';
      } finally {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('lookup-btn').disabled   = false;
      }
    }

    document.getElementById('lookup-btn').addEventListener('click', () => {
      const g = document.getElementById('gene-input').value.trim();
      if (g) lookup(g);
    });

    document.getElementById('gene-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const g = document.getElementById('gene-input').value.trim();
        if (g) lookup(g);
      }
    });

    // Restore last search on open
    const last = localStorage.getItem('vcep-last-gene');
    if (last) {
      document.getElementById('gene-input').value = last;
      lookup(last);
    }
  </script>
</body>
</html>
